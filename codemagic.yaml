workflows:
  ios-build:
    name: VoiceMate iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      vars:
        APP_NAME: "VoiceMate"
        APP_ID: "com.voicemate.app"
        XCODE_SCHEME: "VoiceMate"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project & Build
        script: |
          set -e
          cd iOS
          xcodegen generate
          
          # Build without any code signing
          xcodebuild -project "VoiceMate.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_CODE_SIGN_FLAGS="--no-strict" \
            clean build
          
          # Create unsigned IPA
          cd ../build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r "VoiceMate.app" Payload/
          zip -r "../../../iOS/VoiceMate.ipa" Payload/
    artifacts:
      - iOS/VoiceMate.ipa
