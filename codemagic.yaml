workflows:
  ios-build:
    name: VoiceMate iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      vars:
        APP_NAME: "VoiceMate"
        APP_ID: "com.voicemate.app"
        XCODE_SCHEME: "VoiceMate"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          cd iOS
          xcodegen generate
      - name: Build unsigned IPA
        script: |
          cd iOS
          xcodebuild -project "VoiceMate.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build
          mkdir -p Payload
          cp -r "../build/Build/Products/Release-iphoneos/VoiceMate.app" Payload/
          zip -r "VoiceMate.ipa" Payload/
    artifacts:
      - iOS/VoiceMate.ipa
    publishing:
      email:
        recipients: []
